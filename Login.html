 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="CSS/Login.css">


</head>
<body>
    <div class="conteiner">
        <div class="conteiner-lg">
            <div class="login">
                <h2 class="title">Ingresa tu Usuario y Contrasena</h2>
                <form action="">
                    <h2>Ingresa tu Usuario:</h2>
                    <input type="text" placeholder="Usuario">

                    <h2>Ingresa tu Contrasena</h2>
                    <input type="password" placeholder="Contrasena">

                    <button class="access"><a href="#">Acceder</a></button>
                    <a href="#">Olvidaste tu Contrasena?</a>
                    <a href="#">Registrate</a>
                </form>
            </div>

            <div class="login-nt">
                <h2 class="title">Inicia seccion con tus Redes</h2>
                <div class="icons">
                    <button class="mail"><i class="fa-solid fa-envelope"></i>  Acceder con Email</button>
                    <button class="fb"><i class="fa-brands fa-facebook"></i>  Acceder con Facebook</button>
                    <button class="x"><i class="fa-brands fa-x-twitter"></i>  Acceder con X</button>
                    <button class="ig"><i class="fa-brands fa-instagram"></i>  Acceder con Instagram</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
