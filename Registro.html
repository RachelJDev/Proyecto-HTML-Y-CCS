<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormularioRegistro</title>
    <link rel="stylesheet" href="CSS/Registro.css">
</head>
<body>
    <main>
        <div class= "container" >
            <form class="form">
                <h1>Formulario de Registro</h1>
                <h2>Nombre:</h2>
                <input type="text" id="nombre" placeholder="Ingrese su Nombre">
                <p id="errorNombre" class="error"></p>



                <h2>Apellido</h2>
                <input type="text" id="apellido" placeholder="Ingrese su Apellido">
                <p id="errorApellido" class="error"></p>

                <h2>Correo</h2>
                <input type="text" id="correo" placeholder="Ingrese su Correo">
                <p id="errorCorreo" class="error"></p>

                <h2>Contraseña</h2>
                <input type="password" id="contraseña" placeholder="Ingrese una Contraseña">
                <p id="errorContrasena" class="error"></p>

                <button class="register" id="btnRegistro">Registrate</button>
                <a href="Login.html">¿Ya tienes una  Cuenta? Inicia Secion</a>

                <script src="JS/Registro.js"></script>

            </form>
            
        </div>div>
    </main>
    <script src="JS/Registro.js"></script>
</body>
</html>
